<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Legends カスタム大会 集計表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #ff6b6b, #ff8787);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .subtitle {
            font-size: 1.2em;
            color: #aaa;
        }

        .last-update {
            font-size: 0.9em;
            color: #888;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #ff8787;
        }

        /* Team Cards Section */
        .teams-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 2em;
            margin-bottom: 20px;
            color: #ff8787;
            text-shadow: 0 0 20px rgba(255, 135, 135, 0.5);
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .team-card {
            background: rgba(30, 30, 45, 0.8);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid rgba(255, 135, 135, 0.3);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease-out;
        }

        .team-card:hover {
            transform: translateY(-5px);
            border-color: #ff8787;
            box-shadow: 0 10px 30px rgba(255, 135, 135, 0.3);
        }

        .team-image {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: bold;
            overflow: hidden;
        }

        .team-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .team-name {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #fff;
        }

        .team-members {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 10px;
        }

        .team-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8em;
            color: #aaa;
        }

        .stat-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #ff8787;
        }

        /* Ranking Table */
        .ranking-section {
            background: rgba(30, 30, 45, 0.8);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 135, 135, 0.3);
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }

        .ranking-table table {
            width: 100%;
            min-width: 600px;
        }

        .ranking-table th,
        .ranking-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ranking-table th {
            background: rgba(255, 135, 135, 0.2);
            font-weight: bold;
            color: #ff8787;
            position: sticky;
            top: 0;
        }

        .ranking-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .rank-1 { color: #ffd700; font-weight: bold; }
        .rank-2 { color: #c0c0c0; font-weight: bold; }
        .rank-3 { color: #cd7f32; font-weight: bold; }

        /* Error Message */
        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff4444;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        /* Settings */
        .settings-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff8787;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            box-shadow: 0 4px 20px rgba(255, 135, 135, 0.4);
            transition: all 0.3s ease;
        }

        .settings-button:hover {
            transform: scale(1.1);
        }

        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .settings-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            border: 2px solid #ff8787;
        }

        .settings-content h2 {
            margin-bottom: 20px;
            color: #ff8787;
        }

        .settings-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: #fff;
        }

        .settings-content button {
            background: #ff8787;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
            transition: all 0.3s ease;
        }

        .settings-content button:hover {
            background: #ff6b6b;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .teams-grid { grid-template-columns: 1fr; }
            .ranking-table { font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>APEX LEGENDS CUSTOM TOURNAMENT</h1>
            <p class="subtitle">カスタム大会 集計ダッシュボード</p>
            <p class="last-update" id="lastUpdate">最終更新: -</p>
        </header>

        <div id="loadingMessage" class="loading">データを読み込み中...</div>

        <div id="content" style="display: none;">
            <!-- Teams Section -->
            <section class="teams-section">
                <h2 class="section-title">参加チーム</h2>
                <div class="teams-grid" id="teamsGrid">
                    <!-- チームカードはJavaScriptで動的に生成されます -->
                </div>
            </section>

            <!-- Ranking Table -->
            <section class="ranking-section">
                <h2 class="section-title">順位表</h2>
                <div class="ranking-table">
                    <table id="rankingTable">
                        <thead>
                            <tr>
                                <th>順位</th>
                                <th>チーム名</th>
                                <th>メンバー</th>
                                <th>KDポイント</th>
                                <th>キル上昇</th>
                                <th>ペナルティ</th>
                                <th>総ポイント</th>
                            </tr>
                        </thead>
                        <tbody id="rankingTableBody">
                            <!-- テーブル行はJavaScriptで動的に生成されます -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;">
            <h3>エラーが発生しました</h3>
            <p>スプレッドシートのデータを取得できませんでした。</p>
            <p>設定からスプレッドシートのURLを確認してください。</p>
        </div>
    </div>

    <!-- Settings Button -->
    <button class="settings-button" onclick="openSettings()">⚙️</button>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <h2>設定</h2>
            <label>スプレッドシートの公開URL (CSV形式):</label>
            <input type="text" id="spreadsheetUrl" placeholder="https://docs.google.com/spreadsheets/...">
            <label>自動更新間隔 (秒):</label>
            <input type="number" id="updateInterval" value="30" min="10">
            <div>
                <button onclick="saveSettings()">保存</button>
                <button onclick="closeSettings()">キャンセル</button>
            </div>
        </div>
    </div>

    <script>
        // 設定の読み込み
        let config = {
            spreadsheetUrl: localStorage.getItem('spreadsheetUrl') || '',
            updateInterval: parseInt(localStorage.getItem('updateInterval')) || 30,
            teamImages: JSON.parse(localStorage.getItem('teamImages') || '{}')
        };

        let updateTimer;

        // CSVパーサー
        function parseCSV(text) {
            const lines = text.split('\n').filter(line => line.trim());
            const result = [];
            
            for (let i = 0; i < lines.length; i++) {
                const row = [];
                let inQuotes = false;
                let field = '';
                
                for (let j = 0; j < lines[i].length; j++) {
                    const char = lines[i][j];
                    
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        row.push(field.trim());
                        field = '';
                    } else {
                        field += char;
                    }
                }
                row.push(field.trim());
                result.push(row);
            }
            
            return result;
        }

        // データの処理
        function processSpreadsheetData(csvText) {
            const rows = parseCSV(csvText);
            const teams = [];
            
            // ヘッダー行を探す
            let dataStartRow = -1;
            for (let i = 0; i < rows.length; i++) {
                if (rows[i].some(cell => cell.includes('チーム名'))) {
                    dataStartRow = i + 1;
                    break;
                }
            }
            
            if (dataStartRow === -1) return teams;
            
            // チームデータを抽出
            for (let i = dataStartRow; i < rows.length && i < dataStartRow + 20; i++) {
                if (!rows[i] || rows[i].length < 7) continue;
                
                const teamName = rows[i][1]?.trim();
                if (!teamName || teamName === '') continue;
                
                teams.push({
                    rank: i - dataStartRow + 1,
                    name: teamName,
                    members: rows[i][2]?.trim() || '',
                    kdPoints: parseInt(rows[i][3]) || 0,
                    killBonus: parseInt(rows[i][4]) || 0,
                    penalty: parseInt(rows[i][5]) || 0,
                    totalPoints: parseInt(rows[i][6]) || 0
                });
            }
            
            // ポイント順でソート
            teams.sort((a, b) => b.totalPoints - a.totalPoints);
            
            // 順位を再割り当て
            teams.forEach((team, index) => {
                team.rank = index + 1;
            });
            
            return teams;
        }

        // チームカードの生成
        function createTeamCard(team) {
            const imageUrl = config.teamImages[team.name] || '';
            const imageContent = imageUrl 
                ? `<img src="${imageUrl}" alt="${team.name}">`
                : team.name.charAt(0);
            
            return `
                <div class="team-card">
                    <div class="team-image">${imageContent}</div>
                    <h3 class="team-name">${team.name}</h3>
                    <p class="team-members">${team.members}</p>
                    <div class="team-stats">
                        <div class="stat-item">
                            <div class="stat-label">総ポイント</div>
                            <div class="stat-value">${team.totalPoints}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">順位</div>
                            <div class="stat-value">${team.rank}位</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ランキングテーブル行の生成
        function createRankingRow(team) {
            let rankClass = '';
            if (team.rank === 1) rankClass = 'rank-1';
            else if (team.rank === 2) rankClass = 'rank-2';
            else if (team.rank === 3) rankClass = 'rank-3';
            
            return `
                <tr class="${rankClass}">
                    <td>${team.rank}</td>
                    <td>${team.name}</td>
                    <td>${team.members}</td>
                    <td>${team.kdPoints}</td>
                    <td>${team.killBonus}</td>
                    <td>${team.penalty}</td>
                    <td>${team.totalPoints}</td>
                </tr>
            `;
        }

        // データの更新
        async function updateData() {
            if (!config.spreadsheetUrl) {
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(config.spreadsheetUrl);
                const csvText = await response.text();
                const teams = processSpreadsheetData(csvText);
                
                // チームカードを更新
                const teamsGrid = document.getElementById('teamsGrid');
                teamsGrid.innerHTML = teams.map(team => createTeamCard(team)).join('');
                
                // ランキングテーブルを更新
                const tableBody = document.getElementById('rankingTableBody');
                tableBody.innerHTML = teams.map(team => createRankingRow(team)).join('');
                
                // 最終更新時刻を更新
                const now = new Date();
                document.getElementById('lastUpdate').textContent = 
                    `最終更新: ${now.toLocaleString('ja-JP')}`;
                
                // 表示を切り替え
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
                
            } catch (error) {
                console.error('データ取得エラー:', error);
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        // 設定モーダルの開閉
        function openSettings() {
            document.getElementById('spreadsheetUrl').value = config.spreadsheetUrl;
            document.getElementById('updateInterval').value = config.updateInterval;
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        function saveSettings() {
            config.spreadsheetUrl = document.getElementById('spreadsheetUrl').value;
            config.updateInterval = parseInt(document.getElementById('updateInterval').value);
            
            localStorage.setItem('spreadsheetUrl', config.spreadsheetUrl);
            localStorage.setItem('updateInterval', config.updateInterval);
            
            closeSettings();
            
            // タイマーをリセット
            clearInterval(updateTimer);
            updateData();
            startAutoUpdate();
        }

        // 自動更新の開始
        function startAutoUpdate() {
            updateTimer = setInterval(updateData, config.updateInterval * 1000);
        }

        // チーム画像を設定する関数
        function setTeamImage(teamName, imageUrl) {
            config.teamImages[teamName] = imageUrl;
            localStorage.setItem('teamImages', JSON.stringify(config.teamImages));
            updateData();
        }

        // モーダルの外側クリックで閉じる
        window.onclick = function(event) {
            const modal = document.getElementById('settingsModal');
            if (event.target === modal) {
                closeSettings();
            }
        }

        // 初期化
        window.onload = function() {
            updateData();
            if (config.spreadsheetUrl) {
                startAutoUpdate();
            }
        };
    </script>
</body>
</html>
