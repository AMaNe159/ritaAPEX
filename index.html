<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX カスタム大会 特典集計表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .refresh-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c62828;
        }

        .ranking-section {
            margin-bottom: 40px;
        }

        .ranking-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }

        .podium {
            display: flex;
            justify-content: center;
            align-items: end;
            margin-bottom: 40px;
            gap: 20px;
        }

        .podium-item {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            min-width: 180px;
        }

        .podium-item:hover {
            transform: translateY(-5px);
        }

        .podium-item.first {
            order: 2;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: scale(1.1);
        }

        .podium-item.second {
            order: 1;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .podium-item.third {
            order: 3;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .podium-rank {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .podium-team {
            font-size: 1.2em;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        .podium-points {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .team-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
            border-color: #3498db;
        }

        .team-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .team-image {
            width: 80px;
            height: 45px;
            background: linear-gradient(45deg, #ddd, #f0f0f0);
            border-radius: 8px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
            overflow: hidden;
        }

        .team-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .team-info h3 {
            font-size: 1.3em;
            color: #2c3e50;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .team-rank {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .team-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat-value {
            font-size: 1.4em;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .rounds-section {
            margin-top: 40px;
        }

        .rounds-table {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        .rounds-grid {
            display: grid;
            grid-template-columns: 180px repeat(20, 80px);
            gap: 8px;
            min-width: 1800px;
        }

        .round-header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 12px 8px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .team-row {
            display: contents;
        }

        .team-name-cell {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            word-wrap: break-word;
            font-size: 0.9em;
        }

        .round-cell {
            background: white;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 0.8em;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 50px;
        }

        .round-cell.has-data {
            background: #e8f5e8;
            border-color: #4caf50;
        }

        .round-cell .kills {
            color: #d32f2f;
            font-weight: bold;
        }

        .round-cell .rank {
            color: #1976d2;
            font-size: 0.7em;
        }

        .last-updated {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .podium {
                flex-direction: column;
                align-items: center;
            }
            
            .podium-item {
                width: 100%;
                max-width: 300px;
            }
            
            .podium-item.first {
                transform: none;
                order: 1;
            }
            
            .team-grid {
                grid-template-columns: 1fr;
            }
            
            .rounds-grid {
                grid-template-columns: 120px repeat(20, 60px);
            }
            
            .round-header, .round-cell {
                font-size: 0.7em;
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 APEX カスタム大会 特典集計表</h1>
        
        <div class="controls">
            <button class="refresh-btn" onclick="loadData()">🔄 データを更新</button>
            <div id="status" class="status" style="display: none;"></div>
        </div>
        
        <div id="loading" class="loading">データを読み込み中...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="content" style="display: none;">
            <!-- 表彰台 -->
            <div class="ranking-section">
                <h2>🏆 総合順位</h2>
                <div class="podium" id="podium">
                    <!-- 表彰台の内容はJavaScriptで動的に生成 -->
                </div>
            </div>
            
            <!-- チーム一覧 -->
            <div class="ranking-section">
                <h2>👥 チーム詳細</h2>
                <div class="team-grid" id="teamGrid">
                    <!-- チームカードはJavaScriptで動的に生成 -->
                </div>
            </div>
            
            <!-- ラウンド別詳細 -->
            <div class="rounds-section">
                <h2>📊 ラウンド別詳細</h2>
                <div class="rounds-table">
                    <div id="roundsDetail">
                        <!-- ラウンド別詳細はJavaScriptで動的に生成 -->
                    </div>
                </div>
            </div>
            
            <div class="last-updated" id="lastUpdated">
                最終更新: <span id="updateTime"></span>
            </div>
        </div>
    </div>

    <script>
        // Googleスプレッドシートの公開URL
        const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQS9qgXtdl5gSYj6e0Zvd0xaOszl7OBDHP_Rn4wJJLrWFiL06gMf1DIbaB-VSgcZo-UYVXIqCDkzKcx/pub?gid=405728066&single=true&output=csv';
        
        let currentData = [];

        async function loadData() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const contentEl = document.getElementById('content');
            const statusEl = document.getElementById('status');
            
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            contentEl.style.display = 'none';
            statusEl.style.display = 'none';
            
            try {
                const response = await fetch(SPREADSHEET_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const csvData = await response.text();
                const data = parseCSVData(csvData);
                
                if (data.length === 0) {
                    throw new Error('データが見つかりませんでした');
                }
                
                currentData = data;
                
                renderPodium(data);
                renderTeamGrid(data);
                renderRoundsDetail(data);
                
                document.getElementById('updateTime').textContent = new Date().toLocaleString('ja-JP');
                
                loadingEl.style.display = 'none';
                contentEl.style.display = 'block';
                
                // 成功ステータス表示
                statusEl.textContent = '✅ データを更新しました';
                statusEl.className = 'status success';
                statusEl.style.display = 'block';
                setTimeout(() => statusEl.style.display = 'none', 3000);
                
            } catch (error) {
                console.error('データの読み込みに失敗しました:', error);
                errorEl.textContent = `データの読み込みに失敗しました: ${error.message}`;
                errorEl.style.display = 'block';
                loadingEl.style.display = 'none';
                
                // エラーステータス表示
                statusEl.textContent = '❌ 更新に失敗しました';
                statusEl.className = 'status error';
                statusEl.style.display = 'block';
            }
        }

        function parseCSVData(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim());
            const teams = [];
            
            // CSVデータの解析
            // 画像で確認した構造に基づいて解析
            let teamDataStarted = false;
            let currentTeam = null;
            
            for (let i = 0; i < lines.length; i++) {
                const cells = parseCSVLine(lines[i]);
                
                // チーム行の識別（チーム名が入っている行）
                if (cells[0] && cells[0].includes('チーム') && cells[1]) {
                    if (currentTeam) {
                        teams.push(currentTeam);
                    }
                    
                    currentTeam = {
                        teamName: cells[0] || `チーム${teams.length + 1}`,
                        totalPoints: parseInt(cells[1]) || 0,
                        kills: 0,
                        rankPoints: 0,
                        rounds: [],
                        rank: teams.length + 1
                    };
                    
                    // ラウンドデータの収集（列3以降）
                    for (let j = 2; j < Math.min(cells.length, 22); j++) {
                        if (cells[j] && cells[j] !== '#N/A' && cells[j] !== '') {
                            const value = parseInt(cells[j]);
                            if (!isNaN(value)) {
                                const roundIndex = Math.floor((j - 2) / 2);
                                if (!currentTeam.rounds[roundIndex]) {
                                    currentTeam.rounds[roundIndex] = { kills: 0, rank: 0 };
                                }
                                
                                if ((j - 2) % 2 === 0) {
                                    // キル数
                                    currentTeam.rounds[roundIndex].kills = value;
                                    currentTeam.kills += value;
                                } else {
                                    // 順位
                                    currentTeam.rounds[roundIndex].rank = value;
                                    // 順位ポイントの計算（簡易版）
                                    if (value === 1) currentTeam.rankPoints += 10;
                                    else if (value === 2) currentTeam.rankPoints += 6;
                                    else if (value === 3) currentTeam.rankPoints += 4;
                                    else if (value <= 5) currentTeam.rankPoints += 2;
                                    else if (value <= 10) currentTeam.rankPoints += 1;
                                }
                            }
                        }
                    }
                }
            }
            
            if (currentTeam) {
                teams.push(currentTeam);
            }
            
            // 総合ポイントでソート
            teams.sort((a, b) => b.totalPoints - a.totalPoints);
            
            // 順位を更新
            teams.forEach((team, index) => {
                team.rank = index + 1;
            });
            
            return teams;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            
            result.push(current.trim());
            return result;
        }

        function renderPodium(data) {
            const podiumEl = document.getElementById('podium');
            const topThree = data.slice(0, 3);
            
            podiumEl.innerHTML = '';
            
            topThree.forEach((team, index) => {
                const rankClass = ['first', 'second', 'third'][index];
                const medal = ['🥇', '🥈', '🥉'][index];
                
                const podiumItem = document.createElement('div');
                podiumItem.className = `podium-item ${rankClass}`;
                podiumItem.innerHTML = `
                    <div class="podium-rank">${medal}</div>
                    <div class="podium-team">${team.teamName}</div>
                    <div class="podium-points">${team.totalPoints}pt</div>
                `;
                podiumEl.appendChild(podiumItem);
            });
        }

        function renderTeamGrid(data) {
            const gridEl = document.getElementById('teamGrid');
            gridEl.innerHTML = '';
            
            data.forEach((team) => {
                const teamCard = document.createElement('div');
                teamCard.className = 'team-card';
                teamCard.innerHTML = `
                    <div class="team-header">
                        <div class="team-image">
                            <span>16:9</span>
                        </div>
                        <div class="team-info">
                            <h3>${team.teamName}</h3>
                            <div class="team-rank">${team.rank}位</div>
                        </div>
                    </div>
                    <div class="team-stats">
                        <div class="stat-item">
                            <div class="stat-value">${team.totalPoints}</div>
                            <div class="stat-label">総合ポイント</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${team.kills}</div>
                            <div class="stat-label">総キル数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${team.rankPoints}</div>
                            <div class="stat-label">順位ポイント</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${team.rounds.length}</div>
                            <div class="stat-label">参加ラウンド</div>
                        </div>
                    </div>
                `;
                gridEl.appendChild(teamCard);
            });
        }

        function renderRoundsDetail(data) {
            const roundsEl = document.getElementById('roundsDetail');
            roundsEl.innerHTML = '';
            
            if (!data.length) return;
            
            const maxRounds = Math.max(...data.map(team => team.rounds.length));
            
            // グリッドコンテナ
            const gridEl = document.createElement('div');
            gridEl.className = 'rounds-grid';
            
            // ヘッダー行
            const teamHeader = document.createElement('div');
            teamHeader.className = 'round-header';
            teamHeader.textContent = 'チーム名';
            gridEl.appendChild(teamHeader);
            
            for (let i = 1; i <= maxRounds; i++) {
                const roundHeader = document.createElement('div');
                roundHeader.className = 'round-header';
                roundHeader.textContent = `R${i}`;
                gridEl.appendChild(roundHeader);
            }
            
            // 各チームの行
            data.forEach(team => {
                // チーム名セル
                const teamNameCell = document.createElement('div');
                teamNameCell.className = 'team-name-cell';
                teamNameCell.textContent = team.teamName;
                gridEl.appendChild(teamNameCell);
                
                // ラウンドセル
                for (let i = 0; i < maxRounds; i++) {
                    const roundCell = document.createElement('div');
                    roundCell.className = 'round-cell';
                    
                    const round = team.rounds[i];
                    if (round && (round.kills > 0 || round.rank > 0)) {
                        roundCell.classList.add('has-data');
                        roundCell.innerHTML = `
                            <div class="kills">K:${round.kills || 0}</div>
                            <div class="rank">${round.rank || 0}位</div>
                        `;
                    } else {
                        roundCell.innerHTML = '<div>-</div>';
                    }
                    
                    gridEl.appendChild(roundCell);
                }
            });
            
            roundsEl.appendChild(gridEl);
        }

        // ページ読み込み時にデータを読み込む
        window.addEventListener('load', loadData);
        
        // 30秒ごとに自動更新
        setInterval(loadData, 30000);
    </script>
</body>
</html>
